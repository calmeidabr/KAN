name: build-and-push

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build da imagem
        run: docker build -t ghcr.io/${{ github.repository_owner }}/app-mundokan:latest .

      - name: Publish da imagem
        run: docker push ghcr.io/${{ github.repository_owner }}/app-mundokan:latest
