name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 2.25.132.148
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port:  22
          protocol: tcp4
          timeout: 60s
          command_timeout: 20m
          script: |
            cd /var/www/app-mundokan
            git reset --hard HEAD
            git clean -fd -e .streamlit/
            git pull origin main
            docker compose up -d --build
